name: Deploy to cPanel (bisharod.com)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build for bisharod.com
        working-directory: frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: https://bisharod-api.onrender.com

      - name: Zip dist folder
        run: |
          cd frontend/dist
          zip -r ../../deploy.zip .
          echo "✅ Zip created"

      - name: Upload zip via cPanel API
        run: |
          RESPONSE=$(curl -sk \
            --user "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            --form "dir=/public_html" \
            --form "file=@deploy.zip" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files")
          echo "Response: $RESPONSE"

      - name: Extract zip via cPanel API
        run: |
          RESPONSE=$(curl -sk \
            --user "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            --data "dest=/public_html" \
            --data "file=/public_html/deploy.zip" \
            --data "overwrite=1" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/extract")
          echo "Response: $RESPONSE"

      - name: Delete zip via cPanel API
        run: |
          curl -sk \
            --user "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            --data "files-0=/public_html/deploy.zip" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/delete_files"

      - name: Done
        run: echo "🎉 bisharod.com deployed!"
