name: Deploy to bisharod.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: https://bisharod-api.onrender.com

      - name: Deploy to cPanel via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_IP }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          source: "frontend/dist/*"
          target: "/home/bisharod/public_html/"
          strip_components: 2

      - name: Done
        run: echo "🎉 bisharod.com frontend is live!"
