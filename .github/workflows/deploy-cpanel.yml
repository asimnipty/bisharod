name: Deploy to cPanel (bisharod.com)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build for bisharod.com
        working-directory: frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: https://bisharod-api.onrender.com

      - name: Zip dist folder
        run: |
          cd frontend/dist
          zip -r ../../deploy.zip .
          echo "✅ Zip created"
          ls -lh ../../deploy.zip

      - name: Upload zip via cPanel API
        run: |
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://bisharod.com:2083/execute/Fileman/upload_files" \
            -F "dir=/public_html" \
            -F "file=@deploy.zip" \
            -F "overwrite=1" | python3 -m json.tool

      - name: Extract zip via cPanel API
        run: |
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://bisharod.com:2083/execute/Fileman/extract" \
            -d "dest=/public_html" \
            -d "file=/public_html/deploy.zip" \
            -d "overwrite=1" | python3 -m json.tool

      - name: Delete zip via cPanel API
        run: |
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://bisharod.com:2083/execute/Fileman/delete_files" \
            -d "files-0=/public_html/deploy.zip" | python3 -m json.tool

      - name: Done
        run: echo "🎉 bisharod.com is now live!"
