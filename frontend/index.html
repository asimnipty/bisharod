<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/bisharod/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bisharod — Digital Health Data Services built on FHIR" />
    <title>Bisharod — FHIR Health Data Platform</title>
    <script>
      // Handle SPA redirect from 404.html
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect && redirect !== '/') {
          sessionStorage.removeItem('redirect');
          window.history.replaceState(null, null, '/bisharod' + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
